name: Build and Release glibc

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly check for new stable releases
  workflow_dispatch:
    inputs:
      glibc_version:
        description: "glibc version to build (e.g. 2.43, 2.41). Leave empty for latest stable."
        required: false
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------------------------------------------------------
  # 1. Version detection & validation
  # ------------------------------------------------------------------
  check_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Resolve target version
        id: resolve
        run: |
          MANUAL="${{ github.event.inputs.glibc_version }}"

          if [ -n "$MANUAL" ]; then
            # Manual trigger: build the exact requested version
            echo "version=$MANUAL" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Manual build requested: $MANUAL"
          else
            # Scheduled / push: find latest stable (no rc/pre-release)
            LATEST=$(curl -s https://ftp.gnu.org/gnu/libc/ \
              | grep -oE 'glibc-[0-9]+\.[0-9]+(\.[0-9]+)?\.tar\.xz' \
              | grep -v 'rc' \
              | sort -V | tail -n 1 \
              | sed 's/glibc-//;s/\.tar\.xz//')
            echo "version=$LATEST" >> $GITHUB_OUTPUT
            echo "Latest stable detected: $LATEST"
          fi

      - name: Check if tag already exists
        id: check_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.resolve.outputs.version }}"
          if gh api repos/${{ github.repository }}/git/ref/tags/$TAG >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Decide whether to build
        id: decide
        run: |
          MANUAL="${{ github.event.inputs.glibc_version }}"
          TAG_EXISTS="${{ steps.check_tag.outputs.exists }}"

          if [ -n "$MANUAL" ]; then
            # Manual: always build (allows re-building an existing version)
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [ "$TAG_EXISTS" = "true" ]; then
            echo "Tag already exists, skipping build."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  # ------------------------------------------------------------------
  # 2. glibc compilation (Docker, per architecture)
  # ------------------------------------------------------------------
  build_docker:
    needs: check_version
    if: needs.check_version.outputs.should_build == 'true'
    name: glibc compilation (${{ matrix.arch }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
    runs-on: ${{ matrix.runner }}
    env:
      GLIBC_VERSION: ${{ needs.check_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Build Docker image
        run: docker build -f builder/Dockerfile -t glibc-builder:${{ github.sha }} .

      - name: glibc compilation → tarball
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -e GLIBC_VERSION="${{ env.GLIBC_VERSION }}" \
            -e STDOUT=1 \
            glibc-builder:${{ github.sha }} \
            > artifacts/glibc-${{ env.GLIBC_VERSION }}-${{ matrix.arch }}.tar.gz

      - name: Upload artifact glibc
        uses: actions/upload-artifact@v4
        with:
          name: docker-glibc-${{ matrix.arch }}
          path: artifacts/*.tar.gz

  # ------------------------------------------------------------------
  # 3. Debian Trixie runtime libs extraction (libstdc++, libgcc_s)
  # ------------------------------------------------------------------
  package_libs:
    needs: check_version
    if: needs.check_version.outputs.should_build == 'true'
    name: Debian libs packaging (${{ matrix.arch }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    env:
      GLIBC_VERSION: ${{ needs.check_version.outputs.version }}
    steps:
      - name: Download Debian Trixie packages
        run: |
          # Enable Trixie in APT sources (trusted=yes to avoid GPG signature issues in CI)
          echo "deb [trusted=yes] http://deb.debian.org/debian trixie main" | sudo tee /etc/apt/sources.list.d/trixie.list
          sudo apt update -q
          mkdir -p debs && cd debs
          # libtirpc3 is now libtirpc3t64 in Trixie due to 64-bit time transition
          sudo apt download --allow-unauthenticated libstdc++6 libgcc-s1 libtirpc3t64

      - name: Extract .so libraries
        run: |
          mkdir -p extracted
          for deb in debs/*.deb; do
            dpkg --fsys-tarfile "$deb" | tar -xf - -C extracted 2>/dev/null || true
          done

      - name: glibc-libs tarball structuring
        run: |
          mkdir -p pkg/usr/lib/glibc/lib

          # libstdc++.so.6 (copy actual file, resolve possible versioned symlink)
          SO=$(find extracted -name "libstdc++.so.6.*" | grep -v '\.py' | head -1)
          [ -n "$SO" ] && cp "$SO" pkg/usr/lib/glibc/lib/libstdc++.so.6

          # libgcc_s.so.1
          SO=$(find extracted -name "libgcc_s.so.1" | head -1)
          [ -n "$SO" ] && cp "$SO" pkg/usr/lib/glibc/lib/libgcc_s.so.1

          # libtirpc.so.3 (replaces deprecated Sun RPC from glibc)
          SO=$(find extracted -name "libtirpc.so.3.*" | head -1)
          if [ -n "$SO" ]; then
            cp "$SO" pkg/usr/lib/glibc/lib/libtirpc.so.3
          else
            SO=$(find extracted -name "libtirpc.so.3" | head -1)
            [ -n "$SO" ] && cp "$SO" pkg/usr/lib/glibc/lib/libtirpc.so.3
          fi

          # Verification
          ls -lh pkg/usr/lib/glibc/lib/

          tar -czf "glibc-libs-${{ env.GLIBC_VERSION }}-${{ matrix.arch }}.tar.gz" -C pkg .

      - name: Upload artifact glibc-libs
        uses: actions/upload-artifact@v4
        with:
          name: debian-libs-${{ matrix.arch }}
          path: "*.tar.gz"

  # ------------------------------------------------------------------
  # 4. Alpine Packaging (APK) — waits for previous jobs
  # ------------------------------------------------------------------
  build_alpine:
    needs: [check_version, build_docker, package_libs]
    if: needs.check_version.outputs.should_build == 'true'
    name: Build Alpine APK (${{ matrix.arch }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
    runs-on: ${{ matrix.runner }}
    env:
      GLIBC_VERSION: ${{ needs.check_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix git safe directory
        run: git config --global --add safe.directory /github/workspace

      - name: Download artifact glibc
        uses: actions/download-artifact@v4
        with:
          name: docker-glibc-${{ matrix.arch }}
          path: packaging/

      - name: Download artifact glibc-libs (Debian)
        uses: actions/download-artifact@v4
        with:
          name: debian-libs-${{ matrix.arch }}
          path: packaging/

      - name: Verify packaging files
        run: |
          cd packaging
          echo "Vérification des fichiers sources pour abuild..."

          # Liste des fichiers critiques requis par votre APKBUILD
          REQUIRED_FILES=(
            "APKBUILD"
            "ld.so.conf"
            "glibc-enable"
            "glibc-disable"
            "glibc.post-install"
            "glibc-bin.post-install"
          )

          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ ERREUR : Fichier manquant : $file"
              exit 1
            fi
            echo "✅ $file présent"
          done

      - name: Prepare Packaging Environment
        run: |
          # 1. Création physique des clés pour l'action
          echo "${{ secrets.RSA_PRIVATE_KEY }}" > ${{ github.workspace }}/key
          echo "${{ secrets.RSA_PUBLIC_KEY }}" > ${{ github.workspace }}/key.pub

          # 2. Vérification de la présence des fichiers requis par l'APKBUILD
          cd packaging
          FILES=("APKBUILD" "ld.so.conf" "glibc-enable" "glibc-disable")
          for f in "${FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Erreur: $f manquant dans ./packaging"
              exit 1
            fi
          done

      - name: Build APK (${{ matrix.arch }})
        uses: jobians/action-abuild@master
        with:
          PACKAGE_PATH: "packaging"
          release_version: ${{ env.GLIBC_VERSION }}
          rsa_private_key: ${{ secrets.RSA_PRIVATE_KEY }}
          rsa_public_key: ${{ secrets.RSA_PUBLIC_KEY }}

      - name: Collect and Rename APKs
        run: |
          mkdir -p final_packages
          # On utilise sudo car l'action Docker crée les fichiers avec l'utilisateur root/builder
          sudo find ~/packages -type f -name "*.apk" -exec cp {} final_packages/ \;

          cd final_packages
          for f in *.apk; do
            # Nettoyage du nom : glibc-2.43-r0.apk -> glibc-2.43-x86_64.apk
            newname=$(echo "$f" | sed "s/-r[0-9]*\.apk/-${{ matrix.arch }}.apk/")
            [ "$f" != "$newname" ] && mv "$f" "$newname"
          done

      - name: Collect and Rename APKs
        run: |
          mkdir -p final_packages
          # Récupération des APKs depuis le dossier généré par l'action
          sudo find ~/packages -type f -name "*.apk" -exec cp {} final_packages/ \;

          cd final_packages
          for f in *.apk; do
            newname=$(echo "$f" | sed "s/-r[0-9]*\.apk/-${{ matrix.arch }}.apk/")
            [ "$f" != "$newname" ] && mv "$f" "$newname"
          done

      - name: Release creation and APK upload
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.GLIBC_VERSION }}
          name: "Alpine Glibc ${{ env.GLIBC_VERSION }}"
          body: |
            Automated multi-arch build of Alpine glibc packages.

            **Packages included:**
            - `glibc` — core shared libraries
            - `glibc-bin` — utilities (ldconfig, ldd, glibc-enable, glibc-disable)
            - `glibc-libs` — C++ runtime libs from Debian Trixie (libstdc++, libgcc_s, libtirpc)
            - `glibc-i18n` — localization data
            - `glibc-dev` — development files (headers)
          artifacts: "final_packages/**/*.apk"
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}