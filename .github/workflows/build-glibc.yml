name: Build and Release glibc

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      glibc_version:
        description: "glibc version to build (e.g. 2.43). Leave empty for latest stable."
        required: false
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. Version detection
  check_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - name: Resolve target version
        id: resolve
        run: |
          MANUAL="${{ inputs.glibc_version }}"
          if [ -n "$MANUAL" ]; then
            echo "version=$MANUAL" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            LATEST=$(curl -s https://ftp.gnu.org/gnu/libc/ | grep -oE 'glibc-[0-9]+\.[0-9]+(\.[0-9]+)?\.tar\.xz' | grep -v 'rc' | sort -V | tail -n 1 | sed 's/glibc-//;s/\.tar\.xz//')
            echo "version=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: Check if tag exists
        id: check_tag
        run: |
          if gh api repos/${{ github.repository }}/git/ref/tags/v${{ steps.resolve.outputs.version }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to build
        id: decide
        run: |
          if [ -n "${{ inputs.glibc_version }}" ] || [ "${{ steps.check_tag.outputs.exists }}" != "true" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  # 2. glibc compilation
  build_docker:
    needs: check_version
    if: needs.check_version.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p artifacts
      - run: docker build -f builder/Dockerfile -t glibc-builder:${{ github.sha }} .
      - run: |
          # Compile and output directly to tarball
          docker run --rm --platform ${{ matrix.platform }} -e GLIBC_VERSION="${{ needs.check_version.outputs.version }}" -e STDOUT=1 glibc-builder:${{ github.sha }} > artifacts/glibc-${{ needs.check_version.outputs.version }}-${{ matrix.arch }}.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: docker-glibc-${{ matrix.arch }}
          path: artifacts/*.tar.gz
          retention-days: 1

  # 3. Debian Trixie libs extraction
  package_libs:
    needs: check_version
    if: needs.check_version.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - run: |
          echo "deb [trusted=yes] http://deb.debian.org/debian trixie main" | sudo tee /etc/apt/sources.list.d/trixie.list
          sudo apt update -q
          mkdir -p debs && cd debs
          sudo apt download --allow-unauthenticated libstdc++6 libgcc-s1 libtirpc3t64
      - run: |
          mkdir -p extracted pkg/usr/lib/glibc/lib
          for deb in debs/*.deb; do dpkg --fsys-tarfile "$deb" | tar -xf - -C extracted 2>/dev/null || true; done
          find extracted -name "libstdc++.so.6.*" -not -name "*.py" -exec cp {} pkg/usr/lib/glibc/lib/libstdc++.so.6 \; -quit
          find extracted -name "libgcc_s.so.1" -exec cp {} pkg/usr/lib/glibc/lib/ \; -quit
          find extracted -name "libtirpc.so.3*" -exec cp {} pkg/usr/lib/glibc/lib/libtirpc.so.3 \; -quit
          tar -czf "glibc-libs-${{ needs.check_version.outputs.version }}-${{ matrix.arch }}.tar.gz" -C pkg .
      - uses: actions/upload-artifact@v4
        with:
          name: debian-libs-${{ matrix.arch }}
          path: "*.tar.gz"
          retention-days: 1

  # 4. Alpine Packaging
  build_alpine:
    needs: [check_version, build_docker, package_libs]
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - arch: x86_64
            runner: ubuntu-latest
            platform: linux/amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: docker-glibc-${{ matrix.arch }}
          path: packaging/
      - uses: actions/download-artifact@v4
        with:
          name: debian-libs-${{ matrix.arch }}
          path: packaging/

      - name: Build and Rename APK
        run: |
          # 1. Prepare keys on host
          echo "${{ secrets.RSA_PRIVATE_KEY }}" > packaging/private.rsa
          echo "${{ secrets.RSA_PUBLIC_KEY }}" > packaging/private.rsa.pub

          # 2. Run build
          docker run --rm --platform ${{ matrix.platform }} \
            -v ${{ github.workspace }}/packaging:/work \
            -e PKGVER="${{ needs.check_version.outputs.version }}" \
            alpine:3.21 sh -c "
              # Install tools
              apk add --no-cache abuild build-base bash
              adduser -D builder -G abuild

              # Setup standard abuild environment
              su builder -c 'abuild-keygen -a -n'

              # Inject your custom keys into the builder's environment
              # We use the name found in .abuild/abuild.conf or standard naming
              KEY_NAME=\"$(ls /home/builder/.abuild/*.rsa | head -n 1 | xargs basename | sed 's/\.pub//')\"
              cp /work/private.rsa /home/builder/.abuild/\$KEY_NAME
              cp /work/private.rsa.pub /home/builder/.abuild/\$KEY_NAME.pub

              # System-wide trust for the public key
              cp /work/private.rsa.pub /etc/apk/keys/\$KEY_NAME.pub

              # Final permissions check
              chown -R builder:abuild /home/builder/.abuild /work

              # Execution with full login shell to ensure abuild.conf is read
              su - builder -c '
                cd /work
                abuild checksum
                abuild -r
              '
            "

          # 3. Cleanup and Collection
          rm -f packaging/private.rsa packaging/private.rsa.pub
          mkdir -p final_packages
          sudo chown -R $USER:$USER packaging/pkg

          # Improved collect: find all APKs and rename them properly
          find packaging/pkg -name "*.apk" | while read -r apk; do
            filename=$(basename "\$apk")
            # Remove the release part (e.g., -r0) to keep it clean
            clean_name=\$(echo \"\$filename\" | sed -E 's/-r[0-9]+//')
            cp \"\$apk\" \"final_packages/\${clean_name%.apk}-${{ matrix.arch }}.apk\"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: apks-${{ matrix.arch }}
          path: final_packages/*.apk
          retention-days: 1

  # 5. Centralized Release
  publish_release:
    needs: [check_version, build_alpine]
    runs-on: ubuntu-latest
    steps:
      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          pattern: apks-*
          merge-multiple: true
          path: release_artifacts/

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.check_version.outputs.version }}
          name: "Alpine Glibc ${{ needs.check_version.outputs.version }}"
          body: |
            Automated multi-arch build of Alpine glibc packages.

            **Packages included:**
            - `glibc` — core shared libraries
            - `glibc-bin` — utilities (ldconfig, ldd, glibc-enable, glibc-disable)
            - `glibc-libs` — C++ runtime libs from Debian Trixie (libstdc++, libgcc_s, libtirpc)
            - `glibc-i18n` — localization data
            - `glibc-dev` — development files (headers)
          artifacts: "release_artifacts/*.apk"
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}